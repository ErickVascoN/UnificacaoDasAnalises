name: Relatório Diário de Corte

on:
  schedule:
    - cron: '0 12 * * 1-5'  # 09:00 BRT (UTC-3) segunda a sexta
  workflow_dispatch:        # permite disparo manual

# Evita envio duplicado: o GitHub às vezes dispara o mesmo agendamento mais de
# uma vez (quando o cron atrasa e a fila "repete"). Com um grupo de concorrência
# único, um disparo duplicado cancela o anterior em andamento → 1 envio só.
concurrency:
  group: relatorio-diario-corte
  cancel-in-progress: true

jobs:
  enviar-relatorio:
    runs-on: ubuntu-latest

    env:
      EMAIL_REMETENTE: ${{ secrets.EMAIL_REMETENTE }}
      EMAIL_SENHA_APP: ${{ secrets.EMAIL_SENHA_APP }}
      EMAIL_DESTINATARIOS: ${{ secrets.EMAIL_DESTINATARIOS }}

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar bibliotecas do sistema
        run: sudo apt-get install -y libcairo2-dev pkg-config python3-dev

      - name: Instalar dependências
        run: pip install -r scripts/requirements_relatorio.txt

      - name: Enviar relatório
        run: python scripts/relatorio_diario_corte.py
